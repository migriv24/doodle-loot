name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip curl wget \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            lld ccache \
            libltdl-dev

      - name: Install buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Cache Android SDK/NDK and buildozer downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
          key: buildozer-android-sdk-ndk-r25b
          restore-keys: buildozer-android-sdk-ndk-r25b

      - name: Cache Python-for-Android build artifacts
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a
          key: p4a-build-${{ hashFiles('buildozer.spec') }}
          restore-keys: p4a-build-

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DoodleLoot-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
