name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip curl wget \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            lld ccache \
            libltdl-dev

      - name: Install buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
          key: buildozer-android-sdk-ndk-r25b

      - name: Cache Python-for-Android build artifacts
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a
          key: p4a-build-${{ hashFiles('buildozer.spec') }}
          restore-keys: p4a-build-

      - name: Build APK
        run: |
          set -o pipefail
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DoodleLoot-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Doodle Loot - Latest Build"
          body: |
            **AI-generated Android game — latest successful build.**

            Download `DoodleLoot.apk`, transfer to your Android phone, and tap to install.
            (You may need to enable "Install from unknown sources" in Android settings.)

            Built automatically from commit ${{ github.sha }} on ${{ github.ref_name }}.
          files: bin/*.apk
          make_latest: true
          prerelease: false
